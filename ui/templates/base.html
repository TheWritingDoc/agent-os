<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent OS Command Center</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="brand">
        <h1>Agent OS</h1>
        <span class="port">:{{ port }}</span>
      </div>
      <nav>
        <a href="/" class="nav-link {% if request.path == '/' %}active{% endif %}">Dashboard</a>
        <a href="/projects" class="nav-link {% if request.path == '/projects' %}active{% endif %}">Projects</a>
        <a href="/tools" class="nav-link {% if request.path == '/tools' %}active{% endif %}">AI Tools</a>
        <a href="/skills" class="nav-link {% if request.path == '/skills' %}active{% endif %}">Skills</a>
        <a href="/experiments" class="nav-link {% if request.path == '/experiments' %}active{% endif %}">Experiments</a>
        <a href="/journal" class="nav-link {% if request.path == '/journal' %}active{% endif %}">Journal</a>
        <a href="/outputs" class="nav-link {% if request.path == '/outputs' %}active{% endif %}">Outputs</a>
        <a href="/goals" class="nav-link {% if request.path == '/goals' %}active{% endif %}">Goals</a>
      </nav>
    </aside>
    <main class="main">
      {% block content %}{% endblock %}
      <div class="panel log-panel">
        <h3>Live Log</h3>
        <pre id="live-log">Ready.</pre>
      </div>
    </main>
  </div>
  <script src="/static/js/app.js"></script>
</body>
</html>
